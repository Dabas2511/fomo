<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fomo Holdings — Solana Token Radar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Familjen+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111726;
    --surface-hover: #151c30;
    --surface-elev: #1a2238;
    --border: #1e2740;
    --border-hover: #2d3a5c;

    --accent: #8b7dff;
    --accent-dim: rgba(139,125,255,0.12);
    --accent-glow: rgba(139,125,255,0.4);
    --accent-bright: #a594ff;

    --success: #4ade80;
    --danger: #f87171;
    --warn: #fbbf24;

    --text: #e8ecf5;
    --text-dim: #7a849c;
    --text-mid: #a4accc;

    --mono: 'DM Mono', monospace;
    --sans: 'Familjen Grotesk', sans-serif;

    --radius: 14px;
    --radius-sm: 8px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(139,125,255,0.08), transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(74,222,128,0.04), transparent 50%);
  }
  body::after {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      linear-gradient(rgba(139,125,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(139,125,255,0.015) 1px, transparent 1px);
    background-size: 56px 56px;
  }

  .app { position:relative; z-index:1; min-height:100vh; }

  /* Top bar */
  .topbar {
    display:flex; align-items:center; justify-content:space-between;
    padding: 0 32px; height: 64px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,14,26,0.85);
    backdrop-filter: blur(20px);
    position: sticky; top:0; z-index:100;
  }
  .brand { display:flex; align-items:center; gap:12px; }
  .brand-mark {
    width:28px; height:28px; border-radius:8px;
    background: linear-gradient(135deg, var(--accent) 0%, #6b5fd9 100%);
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:13px; color:#0a0e1a;
    box-shadow: 0 4px 20px var(--accent-glow);
  }
  .brand-name { font-size:17px; font-weight:700; letter-spacing:-0.3px; line-height:1.1; }
  .brand-name span { color: var(--accent); font-weight:500; }
  .brand-sub { font-family: var(--mono); font-size:9.5px; color: var(--text-dim); letter-spacing:1.5px; text-transform:uppercase; margin-top:2px; }

  .topbar-right { display:flex; align-items:center; gap:12px; }
  .cache-stat {
    font-family: var(--mono); font-size: 10.5px; color: var(--text-dim);
    background: var(--surface); border: 1px solid var(--border);
    padding: 7px 12px; border-radius: var(--radius-sm); white-space: nowrap;
  }
  .cache-stat b { color: var(--accent); font-weight:500; }

  .mint-input {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: var(--mono); font-size:11px;
    padding: 9px 14px; border-radius: var(--radius-sm); width: 320px; outline:none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .mint-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
  .mint-input::placeholder { color: var(--text-dim); }

  .btn {
    border: none; cursor: pointer; font-family: var(--sans); font-weight:600;
    font-size: 13px; padding: 9px 16px; border-radius: var(--radius-sm);
    transition: all 0.15s; white-space: nowrap; letter-spacing:-0.1px;
  }
  .btn-primary {
    background: var(--accent); color: #0a0e1a;
    box-shadow: 0 4px 16px rgba(139,125,255,0.25);
  }
  .btn-primary:hover { background: var(--accent-bright); transform: translateY(-1px); box-shadow: 0 6px 20px var(--accent-glow); }
  .btn-ghost {
    background: transparent; color: var(--text-mid);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--surface); color: var(--text); }

  /* Hero */
  .hero {
    padding: 48px 32px 24px;
    max-width: 1400px; margin: 0 auto;
  }
  .hero-title {
    font-size: 28px; font-weight:700; letter-spacing:-0.5px; margin-bottom:6px;
  }
  .hero-title .accent { color: var(--accent); }
  .hero-sub { color: var(--text-dim); font-size:14px; font-weight:400; }

  /* Card grid */
  .grid-section { padding: 0 32px 48px; max-width: 1400px; margin: 0 auto; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  .card {
    background: linear-gradient(180deg, var(--surface) 0%, rgba(17,23,38,0.6) 100%);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    transition: all 0.2s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content:''; position:absolute; top:0; left:0; right:0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
    opacity: 0; transition: opacity 0.3s;
  }
  .card:hover {
    border-color: var(--border-hover); transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.3), 0 0 0 1px var(--accent-dim);
  }
  .card:hover::before { opacity: 1; }

  .card-head { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:18px; }
  .card-ident { display:flex; align-items:center; gap:12px; min-width:0; }
  .card-avatar {
    width: 38px; height: 38px; border-radius: 10px;
    background: linear-gradient(135deg, #3d3668, #1f1a40);
    display:flex; align-items:center; justify-content:center;
    font-size: 14px; font-weight: 800; color: var(--accent-bright);
    flex-shrink: 0; letter-spacing:-0.5px;
  }
  .card-title { min-width:0; flex:1; }
  .card-name {
    font-size:16px; font-weight:700; letter-spacing:-0.3px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .card-mint { font-family: var(--mono); font-size: 10px; color: var(--text-dim); margin-top:2px; }
  .card-close {
    background: transparent; border: 1px solid var(--border); cursor: pointer;
    color: var(--text-dim); width: 24px; height: 24px; border-radius: 6px;
    display:flex; align-items:center; justify-content:center; font-size: 14px; line-height:1;
    transition: all 0.15s; flex-shrink:0;
  }
  .card-close:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

  .card-metric-main { display:flex; align-items:baseline; gap: 10px; margin-bottom: 14px; }
  .card-pct {
    font-family: var(--mono); font-size: 32px; font-weight: 500;
    color: var(--accent); letter-spacing:-1px;
    text-shadow: 0 0 24px var(--accent-glow);
  }
  .card-pct.zero { color: var(--text-dim); text-shadow: none; }
  .card-pct-label { font-size: 10px; color: var(--text-dim); font-family: var(--mono); letter-spacing: 1px; text-transform: uppercase; }

  .card-spark { margin-bottom: 14px; height: 38px; }
  .card-spark svg { width:100%; height:100%; display:block; }

  .card-stats { display:grid; grid-template-columns: 1fr 1fr; gap: 12px; padding-top: 14px; border-top: 1px dashed var(--border); }
  .card-stat-val { font-family: var(--mono); font-size: 15px; font-weight: 500; color: var(--text); }
  .card-stat-lbl { font-size: 9.5px; color: var(--text-dim); font-family: var(--mono); letter-spacing: 0.8px; text-transform: uppercase; margin-top: 2px; }

  .card-footer {
    display:flex; justify-content:space-between; align-items:center;
    margin-top: 14px; padding-top: 14px; border-top: 1px dashed var(--border);
    font-family: var(--mono); font-size: 10px; color: var(--text-dim);
  }
  .card-status { display:inline-flex; align-items:center; gap: 6px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); box-shadow: 0 0 8px var(--success); }
  .status-dot.refreshing { background: var(--warn); animation: pulse 1s ease infinite; }
  @keyframes pulse { 0%,100% {opacity:1} 50% {opacity:0.4} }

  .card-add {
    border: 2px dashed var(--border); background: transparent; cursor: pointer;
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    gap: 14px; min-height: 280px; transition: all 0.2s; border-radius: var(--radius);
  }
  .card-add:hover { border-color: var(--accent); background: var(--accent-dim); }
  .card-add-icon {
    width: 52px; height: 52px; border-radius: 14px; background: var(--accent-dim);
    display:flex; align-items:center; justify-content:center;
    color: var(--accent); font-size: 28px; font-weight: 300; line-height: 1;
  }
  .card-add-text { color: var(--text-dim); font-size: 14px; font-weight: 500; }
  .card-add:hover .card-add-text { color: var(--accent); }

  /* Detail view */
  .detail-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(10,14,26,0.95);
    backdrop-filter: blur(10px);
    overflow-y: auto;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }

  .detail-wrap { max-width: 1600px; margin: 0 auto; padding: 32px; }

  .detail-layout {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 340px;
    gap: 20px;
    align-items: start;
  }
  @media (max-width: 1100px) { .detail-layout { grid-template-columns: 1fr; } }

  /* Activity sidebar */
  .activity-panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    position: sticky; top: 96px;
    max-height: calc(100vh - 120px); display: flex; flex-direction: column;
  }
  .activity-head {
    padding: 16px 18px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0;
  }
  .activity-pulse {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--mono); font-size: 10px; color: var(--success);
    letter-spacing: 1.2px; text-transform: uppercase;
  }
  .activity-pulse::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--success); box-shadow: 0 0 8px var(--success);
    animation: pulse 1.5s ease infinite;
  }
  .activity-list { flex: 1; overflow-y: auto; }
  .activity-list::-webkit-scrollbar { width: 6px; }
  .activity-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 100px; }

  .activity-event {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    font-family: var(--mono); font-size: 11px;
    display: flex; flex-direction: column; gap: 5px;
  }
  .activity-event:last-child { border-bottom: none; }
  .activity-event-head {
    display: flex; align-items: center; gap: 8px;
  }
  .activity-kind {
    font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
    font-weight: 600; padding: 2px 6px; border-radius: 4px;
    flex-shrink: 0;
  }
  .activity-kind.buy    { background: rgba(74,222,128,0.15); color: var(--success); }
  .activity-kind.sell   { background: rgba(248,113,113,0.15); color: var(--danger); }
  .activity-kind.entry  { background: var(--accent-dim); color: var(--accent); }
  .activity-kind.exit   { background: rgba(251,191,36,0.15); color: var(--warn); }
  .activity-time { color: var(--text-dim); font-size: 9.5px; margin-left: auto; flex-shrink: 0; }
  .activity-wallet {
    color: var(--text-mid); font-size: 11px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0;
  }
  .activity-wallet .wallet-link { padding: 0; font-size: 11px; }
  .activity-amount { color: var(--text); font-weight: 500; }
  .activity-amount.positive { color: var(--success); }
  .activity-amount.negative { color: var(--danger); }

  .activity-empty {
    padding: 40px 20px; text-align: center; color: var(--text-dim);
    font-family: var(--mono); font-size: 11px; letter-spacing: 1px;
  }

  /* History chart */
  .history-chart { height: 200px; }

  .detail-head {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom: 28px;
  }
  .back-btn {
    display:inline-flex; align-items:center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text-mid); padding: 9px 14px; border-radius: var(--radius-sm);
    cursor: pointer; font-family: var(--sans); font-size: 13px; font-weight:500;
    transition: all 0.15s;
  }
  .back-btn:hover { color: var(--text); border-color: var(--border-hover); }

  .detail-title-wrap { display:flex; align-items:center; gap: 18px; margin-bottom: 32px; }
  .detail-avatar {
    width: 56px; height: 56px; border-radius: 14px;
    background: linear-gradient(135deg, #3d3668, #1f1a40);
    display:flex; align-items:center; justify-content:center;
    font-size: 22px; font-weight: 800; color: var(--accent-bright); letter-spacing:-1px;
  }
  .detail-title { font-size: 32px; font-weight:700; letter-spacing:-0.5px; }
  .detail-mint { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-top:2px; }

  .metrics-row {
    display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px;
    margin-bottom: 28px;
  }
  .metric-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px 22px;
  }
  .metric-label {
    font-family: var(--mono); font-size: 10px; color: var(--text-dim);
    letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 10px;
  }
  .metric-value { font-family: var(--mono); font-size: 30px; font-weight: 500; color: var(--text); letter-spacing:-0.5px; }
  .metric-value.accent { color: var(--accent); }
  .metric-sub { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-top: 6px; }

  .detail-grid { display:grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-bottom: 24px; }
  @media (max-width: 960px) { .detail-grid { grid-template-columns: 1fr; } }

  .chart-panel, .holders-panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow:hidden;
  }
  .panel-head {
    padding: 18px 22px; border-bottom: 1px solid var(--border);
    display:flex; justify-content:space-between; align-items:center;
  }
  .panel-title {
    font-family: var(--mono); font-size: 11px; color: var(--text-dim);
    letter-spacing: 1.2px; text-transform: uppercase;
  }
  .panel-body { padding: 22px; }

  .donut-wrap { display:flex; flex-direction:column; align-items:center; gap: 20px; }
  .donut-svg { width: 180px; height: 180px; }
  .legend { display: flex; flex-direction: column; gap: 10px; width:100%; }
  .legend-item {
    display: flex; align-items: center; justify-content: space-between;
    font-family: var(--mono); font-size: 11px;
  }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
  .legend-name { flex:1; color: var(--text-mid); margin-left: 10px; }
  .legend-val { color: var(--text); }

  /* Holders Table */
  table { width: 100%; border-collapse: collapse; }
  thead th {
    padding: 12px 22px; text-align: left; font-family: var(--mono);
    font-size: 10px; letter-spacing: 1.2px; text-transform: uppercase;
    color: var(--text-dim); background: rgba(17,23,38,0.4);
    border-bottom: 1px solid var(--border);
  }
  thead th:last-child { text-align: right; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:hover { background: var(--surface-hover); }
  tbody tr:last-child { border-bottom: none; }
  tbody td { padding: 14px 22px; font-family: var(--mono); font-size: 12px; vertical-align: middle; }
  .rank-cell { color: var(--text-dim); width: 46px; }

  .wallet-link {
    color: var(--accent); cursor: pointer; padding: 4px 8px;
    border-radius: 6px; transition: background 0.15s; display: inline-block;
    font-family: var(--mono);
  }
  .wallet-link:hover { background: var(--accent-dim); }
  .wallet-label-text { color: var(--success); font-weight:600; }
  .wallet-short-dim { color: var(--text-dim); font-size: 10.5px; margin-left: 6px; }
  .solscan-link {
    margin-left: 8px; color: var(--text-dim); font-size: 13px;
    text-decoration: none; opacity: 0.5; transition: opacity 0.15s;
  }
  .solscan-link:hover { opacity: 1; color: var(--accent); }

  .amount-cell { color: var(--text); }
  .pct-cell { text-align: right; }
  .pct-bar-wrap { display:flex; align-items:center; gap: 10px; justify-content: flex-end; }
  .pct-bar { width: 80px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .pct-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; box-shadow: 0 0 8px var(--accent-glow); }

  /* Changes panel */
  .changes-panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow:hidden; margin-bottom: 24px;
  }
  .time-window-tabs { display: flex; gap: 4px; }
  .tw-tab {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-dim); font-family: var(--mono); font-size: 11px;
    padding: 5px 12px; border-radius: 6px; cursor: pointer;
    font-weight: 500; letter-spacing: 0.5px; transition: all 0.15s;
  }
  .tw-tab:hover { color: var(--text); border-color: var(--border-hover); }
  .tw-tab.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }

  .changes-summary {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px; margin-bottom: 20px;
  }
  .change-metric {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 16px;
  }
  .change-metric-label {
    font-family: var(--mono); font-size: 9.5px; color: var(--text-dim);
    letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 6px;
  }
  .change-metric-val {
    font-family: var(--mono); font-size: 20px; font-weight: 500; letter-spacing: -0.3px;
  }
  .change-metric-val.positive { color: var(--success); }
  .change-metric-val.negative { color: var(--danger); }
  .change-metric-val.neutral { color: var(--text-dim); }
  .change-metric-sub {
    font-family: var(--mono); font-size: 10px; color: var(--text-dim); margin-top: 4px;
  }

  .changes-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    margin-top: 20px;
  }
  @media (max-width: 840px) { .changes-grid { grid-template-columns: 1fr; } }

  .change-section { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
  .change-section-head {
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--mono); font-size: 10px; letter-spacing: 1.2px; text-transform: uppercase;
    color: var(--text-dim);
  }
  .change-section-head .count {
    background: var(--surface); padding: 2px 8px; border-radius: 100px;
    color: var(--text-mid); font-size: 10px;
  }
  .change-list { max-height: 260px; overflow-y: auto; }
  .change-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    font-family: var(--mono); font-size: 11px;
  }
  .change-row:last-child { border-bottom: none; }
  .change-row .wallet-link { padding: 2px 6px; font-size: 11px; }
  .change-amount { text-align: right; }
  .change-amount .main { color: var(--text); font-weight: 500; }
  .change-amount .sub { color: var(--text-dim); font-size: 9.5px; margin-top: 2px; }
  .change-delta.positive { color: var(--success); }
  .change-delta.negative { color: var(--danger); }

  /* Card change badge */
  .card-change-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px; border-radius: 100px; font-family: var(--mono);
    font-size: 10px; font-weight: 500; margin-left: 8px;
    vertical-align: middle;
  }
  .card-change-badge.positive { background: rgba(74,222,128,0.15); color: var(--success); }
  .card-change-badge.negative { background: rgba(248,113,113,0.15); color: var(--danger); }
  .card-change-badge.neutral { background: var(--surface-hover); color: var(--text-dim); }


  /* Modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center; z-index: 300;
  }
  .modal {
    background: var(--surface-elev); border: 1px solid var(--border-hover);
    border-radius: var(--radius); padding: 28px; min-width: 440px; max-width: 90vw;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
  }
  .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 6px; letter-spacing:-0.3px; }
  .modal .wallet-addr {
    font-family: var(--mono); font-size: 10.5px; color: var(--text-dim);
    margin: 8px 0 18px; word-break: break-all;
    background: var(--bg); padding: 10px 12px; border-radius: 6px;
  }
  .modal label { font-size: 10px; color: var(--text-dim); letter-spacing: 1.2px; text-transform: uppercase; }
  .modal-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 10px 12px; border-radius: var(--radius-sm);
    font-size: 13px; outline: none; margin-top: 6px;
    font-family: var(--sans);
  }
  .modal-input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; margin-top: 18px; justify-content: flex-end; }

  .empty-grid { padding: 80px 20px; text-align: center; color: var(--text-dim); }
  .empty-title { font-size: 18px; font-weight: 600; color: var(--text-mid); margin-bottom: 8px; }
  .empty-sub { font-size: 13px; color: var(--text-dim); line-height: 1.6; }

  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface-elev); border: 1px solid var(--border-hover);
    color: var(--text); font-family: var(--mono); font-size: 12px;
    padding: 12px 20px; border-radius: var(--radius-sm);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5); z-index: 999;
    transition: opacity 0.3s;
  }
  .toast.error { border-color: var(--danger); color: var(--danger); }
  .toast.success { border-color: var(--success); color: var(--success); }
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">ƒ</div>
      <div>
        <div class="brand-name"><span>fomo</span> Holdings</div>
        <div class="brand-sub">Solana Radar</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="cache-stat" id="cache-stat">Cache: <b>—</b> fomo wallets</div>
      <button class="btn btn-ghost" onclick="refreshAll()" title="Refresh all tokens now">↻ Refresh All</button>
      <input class="mint-input" id="mint-input" placeholder="Paste token mint address..." onkeydown="if(event.key==='Enter') addToken()" />
      <button class="btn btn-primary" onclick="addToken()">+ Track Token</button>
    </div>
  </div>

  <div class="hero">
    <div class="hero-title">Track <span class="accent">fomo</span> app users across Solana tokens</div>
    <div class="hero-sub">Real-time on-chain detection. See what % of holders are active fomo traders.</div>
  </div>

  <div class="grid-section">
    <div class="grid" id="grid"></div>
  </div>
</div>

<div class="detail-overlay" id="detail-view" style="display:none">
  <div class="detail-wrap">
    <div class="detail-head">
      <button class="back-btn" onclick="closeDetail()">← Back to dashboard</button>
      <button class="btn btn-ghost" id="detail-refresh">↻ Refresh</button>
    </div>
    <div id="detail-body"></div>
  </div>
</div>

<div class="modal-bg" id="label-modal" style="display:none" onclick="closeLabel(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>Label wallet</h3>
    <div class="wallet-addr" id="modal-wallet-addr"></div>
    <label>Name / Label</label>
    <input class="modal-input" id="modal-label-input" placeholder="e.g. whale1, @trader, team wallet..." onkeydown="if(event.key==='Enter') submitLabel()"/>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="document.getElementById('label-modal').style.display='none'">Cancel</button>
      <button class="btn btn-ghost" onclick="deleteLabel()" style="color:var(--danger)">Remove</button>
      <button class="btn btn-primary" onclick="submitLabel()">Save</button>
    </div>
  </div>
</div>

<script>
const API = 'https://web-production-47e4c.up.railway.app';
let tokenData = {};
let allLabels = {};
let cardChanges = {};  // { mint: { available, pct_delta, ... } }
let modalWallet = '';
let currentDetail = null;
let currentChangesWindow = 4;  // hours
let lastDetailUpdate = '';     // track what we last rendered
let lastRenderedHTML = '';     // prevent full DOM rebuild

async function apiFetch(path, opts={}) {
  const resp = await fetch(API + path, opts);
  return resp.json();
}

async function addToken() {
  const input = document.getElementById('mint-input');
  const mint = input.value.trim();
  if (!mint) return;
  if (tokenData[mint]) { showToast('Already tracking', 'error'); return; }
  try {
    const res = await apiFetch('/api/tokens', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({mint})
    });
    if (res.ok) {
      input.value = '';
      showToast('Token added — scanning holders...', 'success');
      await pollData();
    } else {
      showToast(res.message || 'Error', 'error');
    }
  } catch(e) { showToast('Cannot reach server', 'error'); }
}

async function removeToken(mint, e) {
  e.stopPropagation();
  if (!confirm('Stop tracking this token?')) return;
  await apiFetch(`/api/token/${mint}`, {method:'DELETE'});
  delete tokenData[mint];
  renderGrid();
}

async function triggerRefresh(mint) {
  await apiFetch(`/api/refresh/${mint}`);
  showToast('Refreshing...', 'success');
}

async function refreshAll() {
  const mints = Object.keys(tokenData);
  if (mints.length === 0) { showToast('No tokens to refresh', 'error'); return; }
  showToast(`Refreshing all ${mints.length} tokens...`, 'success');
  await Promise.all(mints.map(m => apiFetch(`/api/refresh/${m}`).catch(() => {})));
  setTimeout(pollData, 500);
}

function openLabelModal(wallet, currentLabel='') {
  modalWallet = wallet;
  document.getElementById('modal-wallet-addr').textContent = wallet;
  document.getElementById('modal-label-input').value = currentLabel;
  document.getElementById('label-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('modal-label-input').focus(), 50);
}

function closeLabel(e) {
  if (e.target.id === 'label-modal') document.getElementById('label-modal').style.display = 'none';
}

async function submitLabel() {
  const name = document.getElementById('modal-label-input').value.trim();
  try {
    await apiFetch('/api/labels', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({wallet: modalWallet, name})
    });
    if (name) allLabels[modalWallet] = name;
    else delete allLabels[modalWallet];
    document.getElementById('label-modal').style.display = 'none';
    showToast(name ? `Labeled as "${name}"` : 'Label removed', 'success');
    if (currentDetail) renderDetail(currentDetail);
    renderGrid();
  } catch(e) { showToast('Label save failed', 'error'); }
}

async function deleteLabel() {
  try {
    await apiFetch(`/api/label/${modalWallet}`, {method:'DELETE'});
    delete allLabels[modalWallet];
    document.getElementById('label-modal').style.display = 'none';
    showToast('Label removed', 'success');
    if (currentDetail) renderDetail(currentDetail);
    renderGrid();
  } catch(e) { showToast('Failed to remove', 'error'); }
}

function short(addr) { return `${addr.slice(0,4)}…${addr.slice(-4)}`; }
function shortMid(addr) { return `${addr.slice(0,6)}…${addr.slice(-4)}`; }

function sparklineSVG(history) {
  if (!history || history.length < 2) {
    return '<svg viewBox="0 0 100 38"><line x1="0" y1="19" x2="100" y2="19" stroke="rgba(139,125,255,0.2)" stroke-width="1" stroke-dasharray="2,3"/></svg>';
  }
  const vals = history.map(h => h.fomo_pct);
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const pts = vals.map((v, i) => {
    const x = (i / (vals.length - 1)) * 100;
    const y = 36 - ((v - min) / range) * 32 - 2;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return `<svg viewBox="0 0 100 38" preserveAspectRatio="none">
    <defs><linearGradient id="sparkg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#8b7dff" stop-opacity="0.35"/><stop offset="100%" stop-color="#8b7dff" stop-opacity="0"/></linearGradient></defs>
    <polygon points="0,38 ${pts} 100,38" fill="url(#sparkg)"/>
    <polyline points="${pts}" fill="none" stroke="#8b7dff" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

function renderCard(mint, data) {
  const name = data.name || mint.slice(0,8);
  const symbol = (data.name || '??').slice(0,2).toUpperCase();
  const status = data.status || 'initializing';
  const pct = data.fomo_pct ?? 0;
  const holders = data.fomo_holders_count ?? 0;
  const total = data.total_holders ?? 0;
  const supply = data.fomo_supply ?? 0;
  const statusClass = status === 'refreshing' ? 'refreshing' : '';
  const statusText = status === 'ready' ? 'Live' : status === 'refreshing' ? 'Scanning' : 'Loading';
  const pctClass = pct === 0 ? 'zero' : '';

  // Change badge — shows supply % change over 24h (how much token the fomo holders are gaining/losing)
  const change = cardChanges[mint];
  let badgeHtml = '';
  if (change && change.available) {
    const delta = change.supply_pct_change;
    const cls = delta > 0 ? 'positive' : delta < 0 ? 'negative' : 'neutral';
    const sign = delta > 0 ? '+' : '';
    badgeHtml = `<span class="card-change-badge ${cls}" title="fomo supply change over ${change.actual_hours_ago.toFixed(1)}h">${sign}${delta.toFixed(2)}% 24h</span>`;
  }

  return `<div class="card" onclick="openDetail('${mint}')">
    <div class="card-head">
      <div class="card-ident">
        <div class="card-avatar">${symbol}</div>
        <div class="card-title">
          <div class="card-name">${name}</div>
          <div class="card-mint">${short(mint)}</div>
        </div>
      </div>
      <button class="card-close" onclick="removeToken('${mint}', event)" title="Remove">×</button>
    </div>
    <div class="card-metric-main">
      <div class="card-pct ${pctClass}">${pct.toFixed(2)}%</div>
      <div class="card-pct-label">on fomo</div>
      ${badgeHtml}
    </div>
    <div class="card-spark">${sparklineSVG(data.history)}</div>
    <div class="card-stats">
      <div>
        <div class="card-stat-val">${holders} / ${total}</div>
        <div class="card-stat-lbl">fomo holders</div>
      </div>
      <div>
        <div class="card-stat-val">${supply.toLocaleString(undefined,{maximumFractionDigits:0})}</div>
        <div class="card-stat-lbl">fomo supply</div>
      </div>
    </div>
    <div class="card-footer">
      <div class="card-status"><span class="status-dot ${statusClass}"></span>${statusText}</div>
      <div>${data.last_updated ? data.last_updated.split(' ')[1] : '—'}</div>
    </div>
  </div>`;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const mints = Object.keys(tokenData);
  const cards = mints.map(m => renderCard(m, tokenData[m])).join('');
  const addCard = `<div class="card-add" onclick="document.getElementById('mint-input').focus()">
    <div class="card-add-icon">+</div>
    <div class="card-add-text">Add Token</div>
  </div>`;
  grid.innerHTML = cards + addCard;
}

function openDetail(mint) {
  currentDetail = mint;
  lastDetailUpdate = '';  // force fresh changes load
  lastRenderedHTML = '';  // force DOM rebuild
  document.getElementById('detail-view').style.display = 'block';
  document.body.style.overflow = 'hidden';
  renderDetail(mint);
  document.getElementById('detail-refresh').onclick = () => triggerRefresh(mint);
}
function closeDetail() {
  currentDetail = null;
  stopActivityPoll();
  document.getElementById('detail-view').style.display = 'none';
  document.body.style.overflow = '';
}

function renderDetail(mint) {
  const data = tokenData[mint];
  if (!data) return;
  const name = data.name || mint.slice(0,8);
  const symbol = (data.name || '??').slice(0,2).toUpperCase();
  const pct = data.fomo_pct ?? 0;
  const nonPct = 100 - pct;
  const holders = data.fomo_holders_count ?? 0;
  const total = data.total_holders ?? 0;
  const supply = data.fomo_supply ?? 0;
  const totalSupply = data.total_supply ?? 0;

  const C = 2 * Math.PI * 60;
  const fomoLen = (pct / 100) * C;
  const donut = `<svg class="donut-svg" viewBox="0 0 160 160">
    <circle cx="80" cy="80" r="60" fill="none" stroke="var(--border)" stroke-width="14"/>
    <circle cx="80" cy="80" r="60" fill="none" stroke="var(--accent)" stroke-width="14"
            stroke-dasharray="${fomoLen} ${C}" stroke-linecap="round" transform="rotate(-90 80 80)"
            style="filter: drop-shadow(0 0 12px var(--accent-glow))"/>
    <text x="80" y="82" text-anchor="middle" fill="var(--accent)" font-family="DM Mono, monospace" font-size="22" font-weight="500" letter-spacing="-1">${pct.toFixed(1)}%</text>
    <text x="80" y="100" text-anchor="middle" fill="var(--text-dim)" font-family="DM Mono, monospace" font-size="8" letter-spacing="1.5">ON FOMO</text>
  </svg>`;

  const hist = data.history || [];
  let chartSVG = '';
  if (hist.length >= 2) {
    const vals = hist.map(h => h.fomo_pct);
    const min = Math.min(...vals, 0), max = Math.max(...vals, 0.1);
    const range = max - min || 1;
    const w = 800, h = 200, pad = 30;
    const ptsArr = vals.map((v, i) => {
      const x = pad + (i / (vals.length - 1)) * (w - pad*2);
      const y = h - pad - ((v - min) / range) * (h - pad*2);
      return [x, y];
    });
    const pts = ptsArr.map(p => `${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
    const lastPt = ptsArr[ptsArr.length - 1];
    chartSVG = `<svg class="history-chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%">
      <defs><linearGradient id="histg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#8b7dff" stop-opacity="0.3"/><stop offset="100%" stop-color="#8b7dff" stop-opacity="0"/></linearGradient></defs>
      <polygon points="${pad},${h-pad} ${pts} ${w-pad},${h-pad}" fill="url(#histg)"/>
      <polyline points="${pts}" fill="none" stroke="#8b7dff" stroke-width="2" stroke-linejoin="round"/>
      <circle cx="${lastPt[0]}" cy="${lastPt[1]}" r="4" fill="#8b7dff" style="filter: drop-shadow(0 0 6px var(--accent-glow))"/>
    </svg>`;
  } else {
    chartSVG = `<div style="padding:60px; text-align:center; color:var(--text-dim); font-family:'DM Mono',monospace; font-size:11px; letter-spacing:1px;">COLLECTING DATA POINTS…</div>`;
  }

  const holdersList = data.top_fomo_holders || [];
  const maxAmt = holdersList.length ? Math.max(...holdersList.map(h => h.amount)) : 1;
  const rows = holdersList.map((h, i) => {
    const s = shortMid(h.wallet);
    const label = allLabels[h.wallet] || h.label || '';
    const walletEsc = h.wallet.replace(/'/g,"\\'");
    const labelEsc = label.replace(/'/g,"\\'");
    const bar = Math.min(100, (h.amount/maxAmt)*100).toFixed(1);
    const display = label
      ? `<span class="wallet-label-text">${label}</span><span class="wallet-short-dim">${s}</span>`
      : s;
    return `<tr>
      <td class="rank-cell">#${i+1}</td>
      <td>
        <span class="wallet-link" onclick="openLabelModal('${walletEsc}','${labelEsc}')" title="Click to label">${display}</span>
        <a class="solscan-link" href="https://solscan.io/account/${h.wallet}" target="_blank" onclick="event.stopPropagation()" title="View on Solscan">⧉</a>
      </td>
      <td class="amount-cell">${h.amount.toLocaleString()}</td>
      <td class="pct-cell">
        <div class="pct-bar-wrap">
          <div class="pct-bar"><div class="pct-bar-fill" style="width:${bar}%"></div></div>
          ${h.pct.toFixed(4)}%
        </div>
      </td>
    </tr>`;
  }).join('');

  const html = `
    <div class="detail-title-wrap">
      <div class="detail-avatar">${symbol}</div>
      <div>
        <div class="detail-title">${name}</div>
        <div class="detail-mint">${mint}</div>
      </div>
    </div>

    <div class="detail-layout">
      <div class="detail-main">

    <div class="metrics-row">
      <div class="metric-card">
        <div class="metric-label">fomo % of supply</div>
        <div class="metric-value accent">${pct.toFixed(2)}%</div>
        <div class="metric-sub">${supply.toLocaleString(undefined,{maximumFractionDigits:2})} tokens</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">fomo holders</div>
        <div class="metric-value">${holders}</div>
        <div class="metric-sub">of ${total} scanned</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">non-fomo %</div>
        <div class="metric-value">${nonPct.toFixed(2)}%</div>
        <div class="metric-sub">${(totalSupply - supply).toLocaleString(undefined,{maximumFractionDigits:2})} tokens</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">total supply</div>
        <div class="metric-value">${totalSupply.toLocaleString(undefined,{maximumFractionDigits:0})}</div>
        <div class="metric-sub">decimals: ${data.decimals ?? 6}</div>
      </div>
    </div>

    <div class="detail-grid">
      <div class="chart-panel">
        <div class="panel-head"><div class="panel-title">Distribution</div></div>
        <div class="panel-body">
          <div class="donut-wrap">
            ${donut}
            <div class="legend">
              <div class="legend-item">
                <div style="display:flex;align-items:center;"><div class="legend-dot" style="background:var(--accent)"></div><span class="legend-name">fomo users</span></div>
                <span class="legend-val">${pct.toFixed(2)}%</span>
              </div>
              <div class="legend-item">
                <div style="display:flex;align-items:center;"><div class="legend-dot" style="background:var(--border)"></div><span class="legend-name">other wallets</span></div>
                <span class="legend-val">${nonPct.toFixed(2)}%</span>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="chart-panel">
        <div class="panel-head"><div class="panel-title">fomo % over time</div></div>
        <div class="panel-body">${chartSVG}</div>
      </div>
    </div>

    <div class="changes-panel" id="changes-panel">
      <div class="panel-head">
        <div class="panel-title">Changes over time</div>
        <div class="time-window-tabs">
          <button class="tw-tab" data-hours="1" onclick="loadChanges('${mint}', 1)">1H</button>
          <button class="tw-tab active" data-hours="4" onclick="loadChanges('${mint}', 4)">4H</button>
          <button class="tw-tab" data-hours="12" onclick="loadChanges('${mint}', 12)">12H</button>
          <button class="tw-tab" data-hours="24" onclick="loadChanges('${mint}', 24)">24H</button>
        </div>
      </div>
      <div class="panel-body" id="changes-body">
        <div style="padding:40px; text-align:center; color:var(--text-dim); font-family:'DM Mono',monospace; font-size:11px; letter-spacing:1px;">LOADING…</div>
      </div>
    </div>

    <div class="holders-panel">
      <div class="panel-head">
        <div class="panel-title">Top fomo holders</div>
        <div class="panel-title" style="color:var(--accent)">${holders} holders</div>
      </div>
      ${holdersList.length === 0 ? '<div class="empty-grid"><div class="empty-title">No fomo holders detected</div><div class="empty-sub">Either scan is in progress, or no top-100 holders have traded this token through fomo yet.</div></div>' : `
      <table>
        <thead><tr><th>#</th><th>Wallet</th><th>Amount</th><th>% of supply</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`}
    </div>

      </div>

      <div class="activity-panel">
        <div class="activity-head">
          <div class="panel-title">Activity</div>
          <span class="activity-pulse">Live</span>
        </div>
        <div class="activity-list" id="activity-list">
          <div class="activity-empty">LOADING…</div>
        </div>
      </div>
    </div>
  `;

  // Only rebuild DOM if HTML changed
  if (html !== lastRenderedHTML) {
    document.getElementById('detail-body').innerHTML = html;
    lastRenderedHTML = html;
  }

  // Only re-load changes if scan data updated
  const updated = data.last_updated || '';
  if (updated !== lastDetailUpdate) {
    lastDetailUpdate = updated;
    loadChanges(mint, currentChangesWindow);
  }
  
  // Start live activity polling (always runs for real-time updates)
  startActivityPoll(mint);
}

function timeAgo(ts) {
  const secs = Math.floor(Date.now()/1000 - ts);
  if (secs < 60) return `${secs}s ago`;
  if (secs < 3600) return `${Math.floor(secs/60)}m ago`;
  if (secs < 86400) return `${Math.floor(secs/3600)}h ago`;
  return `${Math.floor(secs/86400)}d ago`;
}

async function loadActivity(mint) {
  const list = document.getElementById('activity-list');
  if (!list) return;

  try {
    const data = await apiFetch(`/api/live-activity/${mint}`);
    if (!data.available || !data.events || data.events.length === 0) {
      list.innerHTML = `<div class="activity-empty">NO ACTIVITY YET</div>`;
      return;
    }

    const rows = data.events.map(ev => {
      const s = shortMid(ev.wallet);
      const label = ev.label || '';
      const walletDisplay = label
        ? `<span class="wallet-label-text">${label}</span><span class="wallet-short-dim">${s}</span>`
        : s;
      const walletEsc = ev.wallet.replace(/'/g,"\\'");
      const labelEsc = label.replace(/'/g,"\\'");

      let amountHtml = '';
      if (ev.kind === 'buy') {
        amountHtml = `<span class="activity-amount positive">+${ev.amount.toLocaleString()}</span>`;
      } else if (ev.kind === 'sell') {
        amountHtml = `<span class="activity-amount negative">-${ev.amount.toLocaleString()}</span>`;
      }

      return `<div class="activity-event">
        <div class="activity-event-head">
          <span class="activity-kind ${ev.kind}">${ev.kind}</span>
          <span class="activity-time">${timeAgo(ev.ts)}</span>
        </div>
        <div class="activity-wallet">
          <span class="wallet-link" onclick="openLabelModal('${walletEsc}','${labelEsc}')">${walletDisplay}</span>
        </div>
        <div>${amountHtml}</div>
      </div>`;
    }).join('');

    list.innerHTML = rows;
  } catch(e) {
    list.innerHTML = `<div class="activity-empty" style="color:var(--danger)">ERROR</div>`;
  }
}

// Auto-refresh activity every 3 seconds when detail view is open
let activityInterval = null;

function startActivityPoll(mint) {
  stopActivityPoll();
  loadActivity(mint);  // load immediately
  activityInterval = setInterval(() => loadActivity(mint), 3000);
}

function stopActivityPoll() {
  if (activityInterval) {
    clearInterval(activityInterval);
    activityInterval = null;
  }
}

// Load change data for a given time window
async function loadChanges(mint, hours) {
  currentChangesWindow = hours;
  // Update active tab
  document.querySelectorAll('.tw-tab').forEach(b => {
    b.classList.toggle('active', parseFloat(b.dataset.hours) === hours);
  });

  const body = document.getElementById('changes-body');
  if (!body) return;
  body.innerHTML = `<div style="padding:40px; text-align:center; color:var(--text-dim); font-family:'DM Mono',monospace; font-size:11px; letter-spacing:1px;">LOADING…</div>`;

  try {
    const data = await apiFetch(`/api/changes/${mint}?hours=${hours}`);
    if (!data.available) {
      body.innerHTML = `<div style="padding:40px; text-align:center; color:var(--text-dim); font-family:'DM Mono',monospace; font-size:11px; letter-spacing:1px;">NOT ENOUGH HISTORY YET — CHECK BACK LATER</div>`;
      return;
    }

    const pctCls = data.pct_delta > 0 ? 'positive' : data.pct_delta < 0 ? 'negative' : 'neutral';
    const countCls = data.count_delta > 0 ? 'positive' : data.count_delta < 0 ? 'negative' : 'neutral';
    const supplyCls = data.supply_delta > 0 ? 'positive' : data.supply_delta < 0 ? 'negative' : 'neutral';
    const sign = v => v > 0 ? '+' : '';

    const renderWalletRow = (row, showDelta=true) => {
      const s = shortMid(row.wallet);
      const label = row.label || '';
      const display = label
        ? `<span class="wallet-label-text">${label}</span><span class="wallet-short-dim">${s}</span>`
        : s;
      const walletEsc = row.wallet.replace(/'/g,"\\'");
      const labelEsc = label.replace(/'/g,"\\'");
      if (showDelta && row.delta !== undefined) {
        const deltaCls = row.delta > 0 ? 'positive' : 'negative';
        return `<div class="change-row">
          <span class="wallet-link" onclick="openLabelModal('${walletEsc}','${labelEsc}')">${display}</span>
          <div class="change-amount">
            <div class="main change-delta ${deltaCls}">${sign(row.delta)}${row.delta.toLocaleString()}</div>
            <div class="sub">${row.before.toLocaleString()} → ${row.after.toLocaleString()}</div>
          </div>
        </div>`;
      } else {
        return `<div class="change-row">
          <span class="wallet-link" onclick="openLabelModal('${walletEsc}','${labelEsc}')">${display}</span>
          <div class="change-amount"><div class="main">${row.amount.toLocaleString()}</div></div>
        </div>`;
      }
    };

    const gainers = data.wallet_changes.filter(w => w.delta > 0).slice(0, 10);
    const losers  = data.wallet_changes.filter(w => w.delta < 0).slice(0, 10);

    body.innerHTML = `
      <div class="changes-summary">
        <div class="change-metric">
          <div class="change-metric-label">fomo % delta</div>
          <div class="change-metric-val ${pctCls}">${sign(data.pct_delta)}${data.pct_delta.toFixed(4)}%</div>
          <div class="change-metric-sub">${data.past_fomo_pct.toFixed(2)}% → ${data.current_fomo_pct.toFixed(2)}%</div>
        </div>
        <div class="change-metric">
          <div class="change-metric-label">holder count</div>
          <div class="change-metric-val ${countCls}">${sign(data.count_delta)}${data.count_delta}</div>
          <div class="change-metric-sub">${data.past_holders_count} → ${data.current_holders_count}</div>
        </div>
        <div class="change-metric">
          <div class="change-metric-label">supply change</div>
          <div class="change-metric-val ${supplyCls}">${sign(data.supply_delta)}${data.supply_delta.toLocaleString(undefined,{maximumFractionDigits:0})}</div>
          <div class="change-metric-sub">tokens</div>
        </div>
        <div class="change-metric">
          <div class="change-metric-label">actual window</div>
          <div class="change-metric-val neutral" style="color:var(--text-mid)">${data.actual_hours_ago.toFixed(1)}h</div>
          <div class="change-metric-sub">requested ${hours}h</div>
        </div>
      </div>

      <div class="changes-grid">
        <div class="change-section">
          <div class="change-section-head">
            <span style="color:var(--success)">↑ New fomo entries</span>
            <span class="count">${data.new_entries.length}</span>
          </div>
          <div class="change-list">
            ${data.new_entries.length === 0 ? '<div style="padding:20px;text-align:center;color:var(--text-dim);font-family:DM Mono,monospace;font-size:10.5px;">NONE</div>' : data.new_entries.map(r => renderWalletRow(r, false)).join('')}
          </div>
        </div>
        <div class="change-section">
          <div class="change-section-head">
            <span style="color:var(--danger)">↓ Exited fomo holders</span>
            <span class="count">${data.exits.length}</span>
          </div>
          <div class="change-list">
            ${data.exits.length === 0 ? '<div style="padding:20px;text-align:center;color:var(--text-dim);font-family:DM Mono,monospace;font-size:10.5px;">NONE</div>' : data.exits.map(r => renderWalletRow(r, false)).join('')}
          </div>
        </div>
        <div class="change-section">
          <div class="change-section-head">
            <span style="color:var(--success)">↑ Top buyers</span>
            <span class="count">${gainers.length}</span>
          </div>
          <div class="change-list">
            ${gainers.length === 0 ? '<div style="padding:20px;text-align:center;color:var(--text-dim);font-family:DM Mono,monospace;font-size:10.5px;">NO CHANGES</div>' : gainers.map(r => renderWalletRow(r, true)).join('')}
          </div>
        </div>
        <div class="change-section">
          <div class="change-section-head">
            <span style="color:var(--danger)">↓ Top sellers</span>
            <span class="count">${losers.length}</span>
          </div>
          <div class="change-list">
            ${losers.length === 0 ? '<div style="padding:20px;text-align:center;color:var(--text-dim);font-family:DM Mono,monospace;font-size:10.5px;">NO CHANGES</div>' : losers.map(r => renderWalletRow(r, true)).join('')}
          </div>
        </div>
      </div>
    `;
  } catch(e) {
    body.innerHTML = `<div style="padding:40px; text-align:center; color:var(--danger); font-family:'DM Mono',monospace; font-size:11px;">ERROR LOADING CHANGES</div>`;
  }
}

async function pollData() {
  try {
    const [tokens, labels, cache] = await Promise.all([
      apiFetch('/api/tokens'),
      apiFetch('/api/labels'),
      apiFetch('/api/cache/stats'),
    ]);
    tokenData = tokens || {};
    allLabels = labels || {};
    const cs = document.getElementById('cache-stat');
    if (cs) cs.innerHTML = `Cache: <b>${cache.fomo_wallets || 0}</b> fomo · <b>${cache.labeled_wallets || 0}</b> labeled`;

    const mints = Object.keys(tokenData);

    // Fetch 24h changes for each card in parallel
    await Promise.all(mints.map(async m => {
      try {
        cardChanges[m] = await apiFetch(`/api/changes/${m}?hours=24`);
      } catch(e) { /* ignore */ }
    }));

    if (mints.length === 0) {
      document.getElementById('grid').innerHTML = `
        <div class="card-add" onclick="document.getElementById('mint-input').focus()" style="grid-column: 1/-1; max-width:420px; margin:0 auto;">
          <div class="card-add-icon">+</div>
          <div class="card-add-text">Add your first token</div>
        </div>`;
    } else {
      renderGrid();
    }

    if (currentDetail && tokenData[currentDetail]) {
      renderDetail(currentDetail);
    } else if (currentDetail) {
      closeDetail();
    }
  } catch(e) {
    console.error('Poll error', e);
  }
}

function showToast(msg, type='') {
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
}

pollData();
setInterval(pollData, 8000);

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('label-modal').style.display === 'flex') {
      document.getElementById('label-modal').style.display = 'none';
    } else if (currentDetail) {
      closeDetail();
    }
  }
});
</script>
</body>
</html>
